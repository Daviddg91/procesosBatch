spring:
  datasource:
    url: jdbc:h2:mem:facturasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations:   classpath:data-local.sql

output:
  path: ./output

# -- Configuracion del batch ---------------------------------------------------
batch:
  schedule:
    # Expresion cron: segundo minuto hora dia-mes mes dia-semana
    # Ejemplos:
    #   "0 0 2 * * *"        -> cada dia a las 02:00
    #   "0 30 8 * * MON-FRI" -> lunes a viernes a las 08:30
    #   "-"                  -> desactivado
    cron: "0 0 2 * * *"
    time-zone: "Europe/Madrid"
  job:
    # Duracion maxima del job en segundos (por defecto 3600 s = 1 hora)
    timeout-seconds: 3600
    # Fecha fija yyyy-MM-dd. Vacio = fecha del dia de ejecucion.
    fecha: ""

logging:
  level:
    com.viewnext: DEBUG
    org.springframework.batch: INFO
