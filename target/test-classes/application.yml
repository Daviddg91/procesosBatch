spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always   # Spring Batch creates its own tables in H2
  sql:
    init:
      mode: always                # schema.sql is executed on startup

output:
  path: ./target/test-output
